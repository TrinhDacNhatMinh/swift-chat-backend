name: CI

on:
  push:
    branches: ["develop", "staging", "main"]
  pull_request:
    branches: ["develop", "staging", "main"]

jobs:
  # ─── Job 1: Lint & Unit Tests ────────────────────────────────────────────────
  lint-and-unit:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Generate Prisma Client
        # prisma generate does not connect to DB; mock URL satisfies env validation only
        env:
          POSTGRESQL: postgresql://localhost:5432/mock
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Unit Tests
        run: pnpm test --coverage --passWithNoTests

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Job 2: E2E Tests ────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-unit
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: rootpassword
          POSTGRES_DB: swift_chat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:6
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: rootpassword
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        env:
          POSTGRESQL: postgresql://root:rootpassword@localhost:5432/swift_chat_test?schema=public
        run: pnpm exec prisma generate

      - name: Prepare Test Database
        env:
          NODE_ENV: test
          POSTGRESQL: postgresql://root:rootpassword@localhost:5432/swift_chat_test?schema=public
        run: pnpm run test:e2e:prepare

      - name: Run E2E Tests
        env:
          NODE_ENV: test
          POSTGRESQL: postgresql://root:rootpassword@localhost:5432/swift_chat_test?schema=public
          MONGODB_URI: mongodb://root:rootpassword@localhost:27017/swift_chat_test?authSource=admin
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          # test-only secrets — do not use in production
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET || 'github-action-test-access-secret-min16chars' }}
          JWT_ACCESS_EXPIRES_IN: 1h
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'github-action-test-refresh-secret-min16chars' }}
          JWT_REFRESH_EXPIRES_IN: 7d
          CORS_ORIGIN: ""
          THROTTLE_TTL: 60000
          THROTTLE_LIMIT: 10000
        run: pnpm test:e2e