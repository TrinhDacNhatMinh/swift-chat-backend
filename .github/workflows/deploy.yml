name: CD — Build & Deploy

on:
  push:
    branches: ["main"]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Job 1: Build & Push Docker Image ────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with git sha for exact traceability: ghcr.io/org/repo:abc1234
            type=sha,prefix=sha-,format=short
            # Tag latest on every main push
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers across runs for faster builds
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ─── Job 2: Deploy ────────────────────────────────────────────────────────────
  # Choose ONE of the deploy strategies below and delete the others.
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Option A: Deploy via SSH to a VPS (self-hosted) ─────────────────────
      # Required secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
      # The server must have Docker + Docker Compose installed.
      #
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     script: |
      #       docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      #       docker stop swift-chat-backend || true
      #       docker rm swift-chat-backend || true
      #       docker run -d \
      #         --name swift-chat-backend \
      #         --env-file /opt/swift-chat/.env.production \
      #         -p 3000:3000 \
      #         --restart unless-stopped \
      #         ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # ── Option B: Deploy to Render (via deploy hook) ─────────────────────────
      # Required secrets: RENDER_DEPLOY_HOOK_URL
      #
      # - name: Trigger Render Deploy Hook
      #   run: |
      #     curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      # ── Option C: Deploy to Railway ───────────────────────────────────────────
      # Required secrets: RAILWAY_TOKEN
