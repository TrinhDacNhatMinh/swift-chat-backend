name: CD — Build & Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, dev]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Build & Push Docker Image ────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Convert repository name to lowercase — Docker registry requirement.
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with git sha for exact traceability: ghcr.io/org/repo:abc1234
            type=sha,prefix=sha-,format=short
            # Tag latest on every main push
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag staging on every dev push
            type=raw,value=staging,enable=${{ github.event.workflow_run.head_branch == 'dev' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging') }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache — no separate registry tag needed, avoids
          # "no record found" errors on first run and works across all branches.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: true

  # ─── Job 2: Deploy to Staging (dev branch) ───────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    if: >-
      ${{
        needs.build-and-push.result == 'success' && (
          github.event.workflow_run.head_branch == 'dev' ||
          (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
        )
      }}

    steps:
      - name: Deploy to Railway (Staging)
        run: |
          curl -X POST \
            "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(serviceId: \"${{ secrets.RAILWAY_STAGING_SERVICE_ID }}\") }"
            }'

  # ─── Job 3: Deploy to Production (main branch) ───────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    if: >-
      ${{
        needs.build-and-push.result == 'success' && (
          github.event.workflow_run.head_branch == 'main' ||
          (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
        )
      }}

    steps:
      - name: Deploy to Railway (Production)
        run: |
          curl -X POST \
            "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(serviceId: \"${{ secrets.RAILWAY_PRODUCTION_SERVICE_ID }}\") }"
            }'
