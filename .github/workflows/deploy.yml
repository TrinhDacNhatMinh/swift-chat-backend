      #     KUBECONFIG: ${{ secrets.KUBECONFIG }}
      #   run: |
      #     kubectl set image deployment/swift-chat-backend \
      #       app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}
      #     kubectl rollout status deployment/swift-chat-backend

      # ── Placeholder (remove when a real strategy is chosen above) ────────────
      - name: ⚠️ No deploy strategy configured
        run: |
          echo "Image built and pushed successfully:"
          echo "  ${{ needs.build-and-push.outputs.image-tag }}"
          echo ""
          echo "Uncomment one of the deploy strategies in this file to complete the CD pipeline."
          echo "See comments in deploy.yml for options: SSH/VPS, Render, Railway, or Kubernetes."
